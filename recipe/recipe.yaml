schema_version: 1

context:
  version: "1.0.0b260604"
  python_min: "3.10"

package:
  name: agent-framework-a2a
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-a2a/agent_framework_a2a-${{ version }}.tar.gz
  sha256: 4eb26b256e91764d9ebc8e61a87c8b5d60e2061dcf143815f6d02cd3f5333107

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - a2a-sdk <2,>=1.0.0

tests:
  - python:
      imports:
        - agent_framework.a2a
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    A2A integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-a2a/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
